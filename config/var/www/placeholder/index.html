<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>YOURDOMAIN — Powered by EngineScript</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-bg: #1a1a1a;
            --card-bg: #2d2d2d;
            --accent-color: #00d4aa;
            --accent-hover: #00c49a;
            --text-primary: #fff;
            --text-secondary: #b3b3b3;
            --text-muted: #9a9a9a;
            --border-color: #444;
            --border-radius: 12px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary-bg) 0%, #2a2a2d 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 640px;
            width: 100%;
            text-align: center;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .logo .accent {
            color: var(--accent-color);
        }

        .domain-name {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 2.5rem 2rem;
            margin-bottom: 2rem;
        }

        .card h2 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        .card p {
            color: var(--text-secondary);
            line-height: 1.7;
            font-size: 1rem;
        }

        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin-top: 1.5rem;
        }

        .links a {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.65rem 1.25rem;
            background: transparent;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: background 0.2s, color 0.2s;
        }

        .links a:hover {
            background: var(--accent-color);
            color: var(--primary-bg);
        }

        .links a svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .footer {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .footer a {
            color: var(--accent-color);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .logo { font-size: 2rem; }
            .card { padding: 1.5rem 1.25rem; }
            .links { flex-direction: column; }
            .links a { justify-content: center; }
        }
    </style>
</head>
<body>

        <div class="domain-name">YOURDOMAIN</div>

                This domain has been configured and is hosted on an

</body>
</html>
