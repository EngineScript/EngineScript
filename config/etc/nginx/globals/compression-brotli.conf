# Brotli

# Cloudflare now supports Brotli to the origin.
# Cloudflare will respect your compression level.
# Do not enable brotli_static unless you know what you are doing and have a plan in place to recompress static files when they change.

# text/html is always compressed by Brotli, but this may change in future module releases.
brotli on;
brotli_comp_level 4;
brotli_min_length 1369;
brotli_static off;
brotli_window 512k;
brotli_types
  application/atom+xml
  application/geo+json
  application/json
  application/ld+json
  application/manifest+json
  application/rdf+xml
  application/rss+xml
  application/vnd.ms-fontobject
  application/vnd.apple.mpegurl
  application/wasm
  application/xhtml+xml
  application/xml
  application/xslt+xml
  font/otf
  font/sfnt
  font/ttf
  image/bmp
  image/svg+xml
  image/x-icon
  text/calendar
  text/css
  text/csv
  text/javascript
  text/markdown
  text/plain
  text/xml
  text/vcard
  text/vtt;
